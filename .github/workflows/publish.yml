# Publish to PyPI when a GitHub release is published.
# Requires a PyPI trusted publisher for this workflow, or a PYPI_API_TOKEN secret.

name: Publish

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build backend
        run: python -m pip install --upgrade pip flit
      - name: Build package
        run: flit build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
